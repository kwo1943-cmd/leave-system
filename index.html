<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team2員工請假申請系統 (多選版)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            
            <div id="form-container">
                <h2>假期申請表</h2>
                <form id="leaveForm">
                    <div class="form-group">
                        <label for="employeeID">員工號碼 (Staff ID)：</label>
                        <input type="text" id="employeeID" placeholder="例如: ST123" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="leaveType">假期種類：</label>
                        <select id="leaveType" required>
                            <option value="" disabled selected>請選擇假期類型</option>
                            <option value="年假">年假 (Annual Leave)</option>
                            <option value="勞工假期">勞工假期 (Statutory Holiday)</option>
                        </select>
                    </div>

                    <div id="selected-dates-container">
                        <label>已選取日期：</label>
                        <div id="date-tags">
                            <span style="color: #999; font-size: 0.9em;">請於下方月曆點擊選取日期...</span>
                        </div>
                        <div id="daysDisplay" style="display: none;">
                            總計選取：<span id="totalDays">0</span> 天
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="remarks">備註：</label>
                        <textarea id="remarks" rows="2" placeholder="請輸入備註內容..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn">提交申請</button>
                </form>
                
                <div id="message"></div>
            </div>

            <hr>

            <div id="calendar-container">
                <h3>假期名額預覽 & 日期選取</h3>
                <p style="text-align:center; font-size: 0.85em; color: #666; margin-bottom: 15px;">
                    (點擊日期格子進行選取/取消)
                </p>
                <div id="calendar"></div>
            </div>

            <hr>

            <div id="manage-section">
                <h3>取消/修正假期</h3>
                <p style="font-size: 0.8em; color: #888; margin-bottom: 10px;">輸入工號可查詢並取消「已申請」的假期：</p>
                <div class="form-group" style="display: flex; gap: 8px;">
                    <input type="text" id="checkID" placeholder="輸入員工工號 (例如: ST123)">
                    <button type="button" id="btnCheck" class="secondary-btn">查詢</button>
                </div>
                <div id="my-leaves-list"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
